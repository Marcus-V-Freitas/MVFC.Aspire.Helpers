name: CI

on:
  push:
    branches: [main, ci/test]
  pull_request:
    branches: [main]

jobs:
  test-and-coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore MVFC.Aspire.Helpers.slnx

      - name: Build
        run: dotnet build MVFC.Aspire.Helpers.slnx --configuration Release --no-restore

      - name: Test with coverage
        run: |
          dotnet test test/MVFC.Aspire.Helpers.Tests/MVFC.Aspire.Helpers.Tests.csproj \
            --configuration Release \
            --no-build \
            --collect:"XPlat Code Coverage" \
            --results-directory ./coverage \
            --settings coverage.runsettings \
            --logger "trx;LogFileName=test-results.trx"

      - name: Install ReportGenerator
        run: dotnet tool install -g dotnet-reportgenerator-globaltool

      - name: Generate coverage report
        if: always()
        run: |
          reportgenerator \
            -reports:"coverage/**/coverage.cobertura.xml" \
            -targetdir:"coverage/report" \
            -reporttypes:"Html;Cobertura;MarkdownSummaryGithub" \
            -assemblyfilters:"+MVFC.Aspire.Helpers.*" \
            -classfilters:"-*.Tests.*;-*.Playground.*"

      - name: Publish summary
        if: always()
        run: cat coverage/report/SummaryGithub.md >> $GITHUB_STEP_SUMMARY

      - name: Comment on PR
        if: always() && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          recreate: true
          path: coverage/report/SummaryGithub.md

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/report
          retention-days: 30

      - name: Upload to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: coverage/**/coverage.cobertura.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: integration
